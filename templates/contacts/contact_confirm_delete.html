{% extends 'contacts/base.html' %}

{% block title %}Delete Contact - Contact Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3 d-block"></i>
                <h4 class="mb-3">Delete Contact</h4>
                <p class="mb-4">
                    Are you sure you want to delete
                    <strong>{{ contact.full_name }}</strong>?
                </p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash-fill"></i> Yes, Delete
                        </button>
                        <a href="{% url 'contact_detail' contact.pk %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
